# Cloudflare Workers 설정 (이식 중 — DESIGN 10절 참조)
#
# 로컬 실행:  npm run dev:edge      (계정 없이 로컬에서만 돈다)
# 배포:       npm run deploy:edge   (Cloudflare 로그인 필요)

name = "webarcade"
main = "src/index.ts"
compatibility_date = "2026-07-21"

# 방 하나 = 오브젝트 하나. 방 코드로 idFromName 하면 전 세계에서 같은
# 오브젝트로 라우팅된다 → 기존의 "서버 머신 1대" 제약이 사라진다.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "RoomObject"

# ⚠️ 무료 플랜은 SQLite 백엔드 DO만 쓸 수 있다 (KV 백엔드는 유료).
#    그래서 new_classes가 아니라 new_sqlite_classes로 만든다.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomObject"]
